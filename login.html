<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC2026 Ennustused – Sisselogimine</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#c0392b;--red-d:#922b21;--gold:#d4ac0d;--gold-l:#f7dc6f;--dark:#1a1a2e;--cream:#fdfcf8;--muted:#6b7280;--border:#dde;--radius:10px}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--dark);background-image:radial-gradient(circle at 20% 20%,rgba(192,57,43,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,172,13,0.1) 0%,transparent 50%)}
.card{background:var(--cream);border-radius:18px;width:100%;max-width:420px;padding:2.5rem 2rem;box-shadow:0 30px 80px rgba(0,0,0,0.5)}
.trophy{font-size:2.5rem;display:block;text-align:center;margin-bottom:0.5rem}
.badge{display:inline-block;background:var(--red);color:var(--gold-l);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:0.75rem}
h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--dark);line-height:1;letter-spacing:1px;margin-bottom:0.2rem;text-align:center}
h1 span{color:var(--red)}
.sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem;text-align:center}
.divider{height:3px;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;margin-bottom:1.75rem}
label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:5px;letter-spacing:0.4px}
input[type=text],input[type=password]{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:15px;background:#fff;color:var(--dark);transition:border-color .2s,box-shadow .2s;margin-bottom:1.25rem;outline:none}
input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,0.12)}
.btn{width:100%;padding:13px;background:var(--red);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;letter-spacing:0.5px;transition:background .2s,transform .1s}
.btn:hover{background:var(--red-d)}
.btn:active{transform:scale(0.98)}
.err{background:#fdf2f2;border:1px solid #fca5a5;color:var(--red);border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:1.25rem;display:none}
.err.show{display:block}
.note{text-align:center;font-size:12px;color:var(--muted);margin-top:1.25rem}
</style>
</head>
<body>
<div class="card">
  <span class="trophy">🏆</span>
  <div style="text-align:center;margin-bottom:0.5rem"><span class="badge">Ainult sõpradele</span></div>
  <h1>WC<span>2026</span></h1>
  <p class="sub">FIFA maailmamestrivõistluste sõpradevaheline ennustusvõistlus</p>
  <div class="divider"></div>
  <div class="err" id="err">Vale kasutajanimi või parool. Proovi uuesti.</div>
  <label for="u">Kasutajanimi</label>
  <input type="text" id="u" placeholder="Sisesta oma kasutajanimi" autocomplete="username">
  <label for="p">Parool</label>
  <input type="password" id="p" placeholder="Sisesta oma parool" autocomplete="current-password">
  <button class="btn" onclick="login()">Sisene ennustusvõistlusele</button>
  <p class="note">Kui vaja ligipääsu, võta ühendust korraldajaga.</p>
</div>
<script>
/*
 * Passwords are stored as SHA-256 hashes only.
 * No plain-text passwords exist anywhere in this file.
 * Hash format: sha256(username_lowercase + ":" + password)
 *
 * To add or change accounts, use the Admin Panel inside the game,
 * or ask someone with Python to run:
 *   import hashlib
 *   hashlib.sha256("username:password".encode()).hexdigest()
 * and paste the result here.
 *
 * IMPORTANT: usernames are always stored and compared in lowercase.
 * Players can log in as "Kaspar", "kaspar", or "KASPAR" — all work.
 */

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/*
 * ── PRE-HASHED ACCOUNTS ──────────────────────────────────────────────
 * These are hashes, not passwords. Changing a hash here does nothing
 * useful unless you know the matching password.
 * To reset a password, use the Admin Panel → Account Manager.
 */
const INITIAL_HASHES = {
  "admin":    "a79f8e1c0d718631e880482d4a447ef7ae03bae454b20758f81558300e745f4c",
  "kaspar":   "786846dcfd15ec5f978e02e287170dbdb8e3a567adb22e6a3b5f411815f16723",
  "kregor":   "ebba98653ada044e7b4655613e770ba86fe7332e5168de1ef788dc7f9d586031",
  "kristjan": "87fcaa6e26daba4ff81c4e1765e3cb47c9a94c4f870ed5f7b239502f24118e45",
  "player4":  "cc57161b358c7a66cc8c06f698a2ab4c3039bf2399ea176e70ffb2c82ef1714b",
  "player5":  "d7c82e4eef376908c3e62990b83d268121efc9992ea30524bc59e823b326e763",
  "player6":  "5fe7eb3403c18823901d4f31a002211cacd77dc4bfc8438fff6ddbaf3eaff899",
  "player7":  "74c65ebe3ed895a575e4b68a6f8990da37d6c93f052c9d6dcf3012477e6ad6ca",
  "player8":  "97e5925bc755f8837156731df325afc6f1cf8e196188309557e25d249006ada9"
};

const ACCOUNTS_KEY = 'wc2026_accounts';

/*
 * On first load: seed localStorage with the hashes above.
 * On subsequent loads: localStorage takes priority — any password
 * changes made inside the game are preserved automatically.
 * Uploading a new version of this file does NOT overwrite existing
 * account changes made through the Admin Panel.
 */
function initAccounts(){
  if(localStorage.getItem(ACCOUNTS_KEY)) return; // already initialised, skip
  localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(INITIAL_HASHES));
}

async function login(){
  // Always compare in lowercase so "Kaspar", "kaspar", "KASPAR" all work
  const u = document.getElementById('u').value.trim().toLowerCase();
  const p = document.getElementById('p').value;
  const e = document.getElementById('err');
  e.classList.remove('show');
  if(!u || !p){ e.classList.add('show'); return; }
  const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY) || '{}');
  const inputHash = await sha256(u + ':' + p);
  if(accounts[u] && accounts[u] === inputHash){
    sessionStorage.setItem('wc2026_user', u);
    window.location.href = 'game.html';
  } else {
    e.classList.add('show');
    document.getElementById('p').value = '';
  }
}

document.addEventListener('keydown', ev => { if(ev.key === 'Enter') login(); });
initAccounts();
</script>
</body>
</html>
